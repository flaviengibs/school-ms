name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: school-management/frontend/package-lock.json

      - name: Install dependencies
        working-directory: school-management/frontend
        run: npm ci

      - name: Build
        working-directory: school-management/frontend
        env:
          # Your Render backend URL, e.g. https://school-management-backend.onrender.com
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # The base path must match your GitHub repo name: /your-repo-name/
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: school-management/frontend/dist

      - uses: actions/deploy-pages@v4
        id: deployment
